name: multi_platform_data_manager

description: "Cross-platform data management app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.2
  html: ^0.15.0
  webview_flutter: ^4.2.1
  logger: ^2.0.2
  table_calendar: ^3.0.9
  shared_preferences: ^2.2.2
  intl: ^0.20.2

  firebase_core: ^4.8.0
  cloud_firestore: ^6.4.0

  syncfusion_flutter_pdfviewer: ^33.2.6
  syncfusion_flutter_pdf: ^33.2.6

  file_picker: ^11.0.2
  path_provider: ^2.1.4
  uuid: ^4.5.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true