name: multi_platform_data_manager

description: "Cross-platform data management app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.2
  html: ^0.15.0
  webview_flutter: ^4.2.1
  url_launcher: ^6.3.2
  logger: ^2.0.2

  # =========================
  # Calendar
  # =========================
  table_calendar: ^3.0.9

  # =========================
  # Local Storage
  # =========================
  shared_preferences: ^2.5.5

  # =========================
  # Date Format
  # =========================
  intl: ^0.20.2

  # =========================
  # Firebase
  # =========================
  firebase_core: 3.13.0
  cloud_firestore: 5.6.6
  firebase_storage: ^12.4.5

  # =========================
  # PDF Viewer
  # =========================
  syncfusion_flutter_pdfviewer: ^33.2.7

  # =========================
  # PDF解析
  # =========================
  syncfusion_flutter_pdf: ^33.2.7

  # =========================
  # OCR
  # =========================
  google_mlkit_commons: ^0.9.0
  google_mlkit_text_recognition: 0.14.0

  # =========================
  # File Picker
  # =========================
  file_picker: ^8.0.7

  # =========================
  # Path
  # =========================
  path_provider: ^2.1.4

  # =========================
  # UUID
  # =========================
  uuid: ^4.5.1

  # =========================
  # State Management
  # =========================
  provider: ^6.1.2

  # =========================
  # PDF → Image
  # =========================
  pdfx: ^2.9.2

dependency_overrides:
  firebase_core: 3.13.0
  cloud_firestore: 5.6.6
  cloud_firestore_platform_interface: 6.6.6
  cloud_firestore_web: 4.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"